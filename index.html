<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>say hello</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: #000;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 1.5rem;
    }
    .message {
      max-width: 40rem;
      line-height: 1.6;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
    }
    .message .accent {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="message">
    <p>Feel free to <span class="accent">say hello</span>.</p>
    <p>Or don't. Wave, send a message, or just lurk quietly in the dark.</p>
    <p>No pressure, no expectations &mdash; whatever. I don't care.</p>
  </main>
</body>
</html>
